<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>

    <link rel="shortcut icon" href="my-favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="my-favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Molos">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳功能維護中 - Molos 毛樂適</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=ZCOOL+Quanyi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .maintenance-wrap {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: var(--secondary-yellow);
        }
        .maintenance-card {
            background: #fff;
            border-radius: 40px;
            padding: 50px 50px 45px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255,157,66,0.15);
            animation: fadeUp 0.6s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .maintenance-img-wrap {
            margin: 0 auto 20px;
            width: 100%;
            max-width: 300px;
        }
        .maintenance-img {
            width: 100%;
            height: auto;
            display: block;
            animation: float 3.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 25px rgba(255,157,66,0.2));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }
        .maintenance-title {
            font-family: 'ZCOOL Quanyi', sans-serif;
            font-size: 1.9rem;
            color: var(--text-color);
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .maintenance-divider {
            width: 50px;
            height: 3px;
            background: var(--primary-orange);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .maintenance-sub {
            font-size: 1.02rem;
            color: #888;
            line-height: 1.8;
            margin-bottom: 28px;
        }
        .maintenance-sub strong { color: var(--primary-orange); }
        .contact-hint {
            background: var(--secondary-yellow);
            border-radius: 20px;
            padding: 18px 22px;
            margin-bottom: 28px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .contact-hint i {
            font-size: 1.4rem;
            color: var(--primary-orange);
            flex-shrink: 0;
        }
        .contact-hint p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.7;
        }
        .contact-hint a {
            color: var(--primary-orange);
            font-weight: bold;
            text-decoration: none;
        }
        .maintenance-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-maint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
        }
        .btn-maint.primary {
            background: var(--primary-orange);
            color: #fff;
        }
        .btn-maint.primary:hover {
            background: #e8892e;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,157,66,0.35);
        }
        .btn-maint.outline {
            background: transparent;
            color: var(--primary-orange);
            border: 2px solid var(--primary-orange);
        }
        .btn-maint.outline:hover {
            background: var(--secondary-yellow);
            transform: translateY(-2px);
        }
        .progress-hint {
            margin-top: 30px;
            padding-top: 22px;
            border-top: 1px dashed #eee;
        }
        .progress-hint p {
            font-size: 0.82rem;
            color: #bbb;
            margin: 0 0 10px;
        }
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .progress-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #eee;
        }
        .progress-dots span.done   { background: var(--primary-orange); }
        .progress-dots span.active {
            background: #ffd199;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 35px 22px 30px;
                border-radius: 30px;
            }
            .maintenance-title { font-size: 1.5rem; }
            .maintenance-img-wrap { max-width: 240px; }
            .contact-hint {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

                            </ul>

                <button class="nav-cart-btn" id="navCartBtn" aria-label="購物車">

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="maintenance-wrap">

            <div class="maintenance-img-wrap">
                <img src="images/maintenance-cart.png"
                     alt="結帳功能維護中"

            </div>

            <h1 class="maintenance-title">結帳功能維護中</h1>

                結帳功能預計近期上線，敬請期待！
            </p>

            <div class="contact-hint">
                <i class="fas fa-headset"></i>
                <p>
                    如有急迫購買需求，歡迎透過客服與我們聯繫：<br>

                    <a href="tel:0212345678">02-1234-5678</a>

            </div>

            <div class="maintenance-actions">
                <a href="index.html#products" class="btn-maint primary">
                    <i class="fas fa-box-open"></i> 繼續逛產品

                <a href="index.html" class="btn-maint outline">
                    <i class="fas fa-home"></i> 回到首頁

            </div>

            <div class="progress-hint">
                <p>網站開發進度</p>
                <div class="progress-dots">
                    <span class="done"   title="首頁"></span>

                    <span title="訂單查詢"></span>
                </div>
            </div>

        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
