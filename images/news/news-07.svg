<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF4E6"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9D42"/>
      <stop offset="100%" stop-color="#FFB96A"/>
    </linearGradient>
    <linearGradient id="pill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFAF4"/>
      <stop offset="100%" stop-color="#FFE8C8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#FF9D42" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bg-grad)"/>

  <!-- 右上裝飾圓 -->
  <circle cx="720" cy="60" r="140" fill="#FF9D42" opacity="0.07"/>
  <circle cx="740" cy="20" r="80" fill="#FF9D42" opacity="0.05"/>

  <!-- 左下裝飾圓 -->
  <circle cx="60" cy="440" r="100" fill="#FF9D42" opacity="0.06"/>

  <!-- 底部橘條 -->
  <rect x="0" y="468" width="800" height="32" fill="url(#orange-grad)" opacity="0.55" rx="0"/>

  <!-- 產品膠囊插圖（示意） -->
  <g transform="translate(580, 155)" filter="url(#shadow)">
    <!-- 外瓶 -->
    <rect x="0" y="0" width="110" height="170" rx="28" fill="url(#orange-grad)"/>
    <!-- 瓶蓋 -->
    <rect x="12" y="-22" width="86" height="36" rx="14" fill="#FF9D42"/>
    <rect x="18" y="-16" width="74" height="24" rx="10" fill="#FFB96A"/>
    <!-- 標籤 -->
    <rect x="10" y="40" width="90" height="100" rx="10" fill="white" opacity="0.25"/>
    <!-- 標籤文字 -->
    <text x="55" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">全效</text>
    <text x="55" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">活力錠</text>
    <!-- 膠囊圖示 -->
    <ellipse cx="55" cy="128" rx="18" ry="9" fill="white" opacity="0.35"/>
    <!-- 閃亮點 -->
    <circle cx="22" cy="20" r="4" fill="white" opacity="0.45"/>
  </g>

  <!-- NEW 徽章 -->
  <rect x="60" y="66" width="148" height="40" rx="20" fill="url(#orange-grad)"/>
  <text x="134" y="91" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="17" font-weight="bold" fill="white">✨ 新品上市</text>

  <!-- 主標題 -->
  <text x="60" y="175" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="52" font-weight="bold" fill="#5A4B40">全效活力錠</text>

  <!-- 副標題 -->
  <text x="60" y="225" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="21" fill="#FF9D42">一錠補足毛孩每日所需</text>

  <!-- 分隔線 -->
  <line x1="60" y1="252" x2="360" y2="252" stroke="#FF9D42" stroke-width="1.5" opacity="0.4"/>

  <!-- 特色標籤 -->
  <rect x="60" y="272" width="128" height="34" rx="17" fill="url(#pill-grad)" stroke="#FFBA73" stroke-width="1.2"/>
  <text x="124" y="294" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="13" fill="#CC7020" font-weight="bold">11 種維他命</text>

  <rect x="202" y="272" width="118" height="34" rx="17" fill="url(#pill-grad)" stroke="#FFBA73" stroke-width="1.2"/>
  <text x="261" y="294" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="13" fill="#CC7020" font-weight="bold">4 種礦物質</text>

  <rect x="60" y="320" width="136" height="34" rx="17" fill="url(#pill-grad)" stroke="#FFBA73" stroke-width="1.2"/>
  <text x="128" y="342" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="13" fill="#CC7020" font-weight="bold">Omega-3 DHA</text>

  <rect x="210" y="320" width="116" height="34" rx="17" fill="url(#pill-grad)" stroke="#FFBA73" stroke-width="1.2"/>
  <text x="268" y="342" text-anchor="middle" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="13" fill="#CC7020" font-weight="bold">零人工添加</text>

  <!-- 上市日期 -->
  <text x="60" y="400" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="15" fill="#5A4B40" opacity="0.55">2026-04-14 正式上市</text>

  <!-- 品牌名稱 -->
  <text x="60" y="453" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="14" fill="#5A4B40" opacity="0.45">Molos 毛樂適寵物營養專家</text>
</svg>
