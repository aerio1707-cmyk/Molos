<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <link rel="icon" type="image/png" href="my-favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="my-favicon/favicon.svg">
    <link rel="shortcut icon" href="my-favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="my-favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Molos 毛樂適">
    <link rel="manifest" href="my-favicon/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 - Molos 毛樂適</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ══════════════════════════════════════
           會員中心頁面樣式
        ══════════════════════════════════════ */

        .member-page {
            min-height: 100vh;
            background: var(--secondary-yellow, #fffbf5);
            padding: 40px 16px 60px;
        }

        .member-container {
            max-width: 960px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── 左側：會員資訊卡 ── */
        .member-sidebar {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(90,75,64,0.08);
            overflow: hidden;
            position: sticky;
            top: 90px;
        }

        .member-avatar-area {
            background: linear-gradient(135deg, #FF9D42 0%, #ffb96a 100%);
            padding: 28px 20px 24px;
            text-align: center;
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 2rem;
            color: #fff;
            font-weight: bold;
            overflow: hidden;
            position: relative;
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-avatar-name {
            color: #fff;
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .member-avatar-email {
            color: rgba(255,255,255,0.8);
            font-size: 0.78rem;
            word-break: break-all;
        }

        /* ── 左側選單 ── */
        .member-nav { padding: 12px 0; }

        .member-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 20px;
            cursor: pointer;
            color: #666;
            font-size: 0.92rem;
            font-weight: bold;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .member-nav-item:hover {
            background: #fff8f0;
            color: var(--primary-orange, #FF9D42);
        }

        .member-nav-item.active {
            background: #fff3e6;
            color: var(--primary-orange, #FF9D42);
            border-left-color: var(--primary-orange, #FF9D42);
        }

        .member-nav-item i {
            width: 18px;
            text-align: center;
            font-size: 0.95rem;
        }

        .member-nav-divider {
            height: 1px;
            background: #f5f5f5;
            margin: 8px 0;
        }

        .member-nav-logout {
            color: #e74c3c !important;
            border-left-color: transparent !important;
            background: none !important;
        }

        .member-nav-logout:hover {
            background: #fff0f0 !important;
        }

        /* ── 右側主內容 ── */
        .member-main { min-width: 0; }

        .member-panel {
            display: none;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(90,75,64,0.08);
            padding: 32px 36px;
            animation: panelIn 0.25s ease;
        }

        .member-panel.active { display: block; }

        @keyframes panelIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .panel-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text-dark, #333);
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 2px solid #f5f5f5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: var(--primary-orange, #FF9D42);
        }

        /* ── 表單樣式 ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .field-group { margin-bottom: 18px; }

        .field-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 7px;
        }

        .field-group input,
        .field-group select,
        .field-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.93rem;
            font-family: inherit;
            background: #fafafa;
            color: var(--text-dark, #333);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus {
            outline: none;
            border-color: var(--primary-orange, #FF9D42);
            box-shadow: 0 0 0 3px rgba(255,157,66,0.15);
            background: #fff;
        }

        .field-group input:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .field-wrap { position: relative; }
        .field-wrap input { padding-left: 40px; }
        .field-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .field-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #bbb;
            padding: 4px;
        }
        .field-wrap .toggle-pw:hover { color: var(--primary-orange, #FF9D42); }

        /* ── 按鈕 ── */
        .btn-primary {
            padding: 11px 28px;
            background: var(--primary-orange, #FF9D42);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 0.93rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255,157,66,0.3);
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #e68a35; transform: scale(1.02); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-ghost {
            padding: 11px 28px;
            background: transparent;
            color: #999;
            border: 1.5px solid #e8e8e8;
            border-radius: 50px;
            font-size: 0.93rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: #ccc; color: #666; }

        .btn-danger {
            padding: 8px 18px;
            background: transparent;
            color: #e74c3c;
            border: 1.5px solid #e74c3c;
            border-radius: 50px;
            font-size: 0.82rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: #fff0f0; }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* ── 訊息提示 ── */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
        }
        .alert.show { display: flex; align-items: center; gap: 10px; }
        .alert-success { background: #eafaf1; color: #27ae60; }
        .alert-error   { background: #fff0f0; color: #e74c3c; }

        /* ── 訂單列表 ── */
        .order-empty {
            text-align: center;
            padding: 48px 20px;
            color: #bbb;
        }
        .order-empty i { font-size: 3rem; margin-bottom: 12px; display: block; }
        .order-empty p { font-size: 0.92rem; }

        .order-card {
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

        .order-card-header {
            background: #fafafa;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-no { font-size: 0.82rem; color: #999; }
        .order-date { font-size: 0.82rem; color: #999; }

        .order-status {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: bold;
        }
        .status-pending   { background: #fff3cd; color: #856404; }
        .status-paid      { background: #d1ecf1; color: #0c5460; }
        .status-shipped   { background: #d4edda; color: #155724; }
        .status-completed { background: #eafaf1; color: #27ae60; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .order-card-body { padding: 16px 20px; }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #f8f8f8;
        }
        .order-item-row:last-child { border-bottom: none; }
        .order-item-name { color: #555; }
        .order-item-qty  { color: #999; font-size: 0.82rem; }
        .order-item-price { color: var(--primary-orange, #FF9D42); font-weight: bold; }

        .order-card-footer {
            padding: 12px 20px;
            background: #fafafa;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        .order-total-label { font-size: 0.88rem; color: #999; }
        .order-total-price {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--primary-orange, #FF9D42);
        }

        /* ── 地址卡片 ── */
        .address-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .address-card {
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            padding: 16px 18px;
            position: relative;
            transition: all 0.2s;
        }
        .address-card.default-addr {
            border-color: var(--primary-orange, #FF9D42);
            background: #fff8f0;
        }

        .address-default-badge {
            display: inline-block;
            padding: 2px 10px;
            background: var(--primary-orange, #FF9D42);
            color: #fff;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .address-name { font-weight: bold; font-size: 0.93rem; color: #333; margin-bottom: 4px; }
        .address-phone { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
        .address-text  { font-size: 0.85rem; color: #888; line-height: 1.5; }

        .address-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-sm {
            padding: 5px 14px;
            font-size: 0.78rem;
            border-radius: 50px;
            border: 1.5px solid #e8e8e8;
            background: #fff;
            color: #666;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-sm:hover { border-color: var(--primary-orange, #FF9D42); color: var(--primary-orange, #FF9D42); }
        .btn-sm.danger:hover { border-color: #e74c3c; color: #e74c3c; }

        .btn-add-address {
            width: 100%;
            padding: 14px;
            border: 2px dashed #e8e8e8;
            border-radius: 14px;
            background: none;
            color: #bbb;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-add-address:hover {
            border-color: var(--primary-orange, #FF9D42);
            color: var(--primary-orange, #FF9D42);
            background: #fff8f0;
        }

        /* ── Loading 遮罩 ── */
        .page-loading {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .page-loading.hide { display: none; }
        .spinner-large {
            width: 44px;
            height: 44px;
            border: 4px solid #f0e8e0;
            border-top-color: var(--primary-orange, #FF9D42);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RWD ── */
        @media (max-width: 768px) {
            .member-container {
                grid-template-columns: 1fr;
            }
            .member-sidebar {
                position: static;
            }
            .member-nav {
                display: flex;
                overflow-x: auto;
                padding: 8px 12px;
                gap: 4px;
            }
            .member-nav-item {
                white-space: nowrap;
                border-left: none;
                border-bottom: 3px solid transparent;
                border-radius: 8px;
                padding: 10px 14px;
            }
            .member-nav-item.active {
                border-left-color: transparent;
                border-bottom-color: var(--primary-orange, #FF9D42);
            }
            .member-panel { padding: 24px 20px; }
            .form-row { grid-template-columns: 1fr; }
            .address-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- 頁面載入遮罩 -->
    <div class="page-loading" id="pageLoading">
        <div class="spinner-large"></div>
    </div>

    <!-- Navbar -->
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Molos 毛樂適" class="brand-logo"></a>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="切換選單">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-right">
                <nav class="nav-menu" id="navMenu">
                    <ul>
                        <li><a href="index.html">首頁</a></li>
                        <li><a href="about.html">關於毛樂適</a></li>
                        <li><a href="index.html#products">營養品系列</a></li>
                        <li><a href="news/index.html">最新消息</a></li>
                    </ul>
                </nav>
                <button class="nav-cart-btn" id="navCartBtn" aria-label="購物車">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="navCartBadge">0</span>
                </button>
            </div>
        </div>
    </header>
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- 會員中心主體 -->
    <div class="member-page">
        <div class="member-container">

            <!-- 左側邊欄 -->
            <aside class="member-sidebar">
                <div class="member-avatar-area">
                    <div class="member-avatar" id="sidebarAvatar">
                        <span id="sidebarInitial">?</span>
                    </div>
                    <div class="member-avatar-name" id="sidebarName">載入中…</div>
                    <div class="member-avatar-email" id="sidebarEmail"></div>
                </div>

                <nav class="member-nav">
                    <div class="member-nav-item active" data-panel="panel-profile">
                        <i class="fas fa-user-edit"></i> 個人資料
                    </div>
                    <div class="member-nav-item" data-panel="panel-password">
                        <i class="fas fa-lock"></i> 修改密碼
                    </div>
                    <div class="member-nav-item" data-panel="panel-orders">
                        <i class="fas fa-box"></i> 訂單查詢
                    </div>
                    <div class="member-nav-item" data-panel="panel-address">
                        <i class="fas fa-map-marker-alt"></i> 地址管理
                    </div>
                    <div class="member-nav-divider"></div>
                    <div class="member-nav-item member-nav-logout" id="btnLogout">
                        <i class="fas fa-sign-out-alt"></i> 登出
                    </div>
                </nav>
            </aside>

            <!-- 右側內容 -->
            <main class="member-main">

                <!-- ① 個人資料 -->
                <div class="member-panel active" id="panel-profile">
                    <div class="panel-title">
                        <i class="fas fa-user-edit"></i> 個人資料
                    </div>

                    <div class="alert alert-success" id="profile-success">
                        <i class="fas fa-check-circle"></i>
                        <span>資料更新成功！</span>
                    </div>
                    <div class="alert alert-error" id="profile-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="profile-error-msg"></span>
                    </div>

                    <div class="field-group">
                        <label>電子信箱（不可修改）</label>
                        <div class="field-wrap">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" id="profile-email" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="field-group">
                            <label>暱稱 <span style="color:#e74c3c">*</span></label>
                            <input type="text" id="profile-name" placeholder="如何稱呼您" maxlength="20">
                        </div>
                        <div class="field-group">
                            <label>手機號碼</label>
                            <input type="tel" id="profile-phone" placeholder="09XXXXXXXX">
                        </div>
                    </div>

                    <div class="field-group">
                        <label>生日</label>
                        <input type="date" id="profile-birthday">
                    </div>

                    <div class="btn-row">
                        <button class="btn-primary" id="btn-save-profile">
                            <i class="fas fa-save" style="margin-right:6px;"></i>儲存變更
                        </button>
                    </div>
                </div>

                <!-- ② 修改密碼 -->
                <div class="member-panel" id="panel-password">
                    <div class="panel-title">
                        <i class="fas fa-lock"></i> 修改密碼
                    </div>

                    <div class="alert alert-success" id="pw-success">
                        <i class="fas fa-check-circle"></i>
                        <span>密碼修改成功！請重新登入。</span>
                    </div>
                    <div class="alert alert-error" id="pw-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="pw-error-msg"></span>
                    </div>

                    <div class="field-group">
                        <label>新密碼 <span style="color:#e74c3c">*</span></label>
                        <div class="field-wrap">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="new-pw" placeholder="至少 8 個字元">
                            <button type="button" class="toggle-pw" data-target="new-pw">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="field-group">
                        <label>確認新密碼 <span style="color:#e74c3c">*</span></label>
                        <div class="field-wrap">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="new-pw2" placeholder="再輸入一次新密碼">
                            <button type="button" class="toggle-pw" data-target="new-pw2">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="btn-row">
                        <button class="btn-primary" id="btn-save-password">
                            <i class="fas fa-key" style="margin-right:6px;"></i>更新密碼
                        </button>
                    </div>
                </div>

                <!-- ③ 訂單查詢 -->
                <div class="member-panel" id="panel-orders">
                    <div class="panel-title">
                        <i class="fas fa-box"></i> 訂單查詢
                    </div>
                    <div id="orders-content">
                        <div class="order-empty">
                            <i class="fas fa-box-open"></i>
                            <p>目前尚無訂單紀錄</p>
                        </div>
                    </div>
                </div>

                <!-- ④ 地址管理 -->
                <div class="member-panel" id="panel-address">
                    <div class="panel-title">
                        <i class="fas fa-map-marker-alt"></i> 地址管理
                    </div>

                    <div class="alert alert-success" id="addr-success">
                        <i class="fas fa-check-circle"></i>
                        <span>地址已儲存！</span>
                    </div>
                    <div class="alert alert-error" id="addr-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="addr-error-msg"></span>
                    </div>

                    <div id="address-list" style="margin-bottom:16px;"></div>

                    <!-- 新增地址表單 -->
                    <div id="address-form-wrap" style="display:none;">
                        <div style="border:1.5px solid #f0e8e0;border-radius:14px;padding:20px;margin-bottom:16px;">
                            <div style="font-weight:bold;color:#555;margin-bottom:16px;font-size:0.92rem;">
                                <i class="fas fa-plus" style="color:var(--primary-orange);margin-right:6px;"></i>新增收件地址
                            </div>
                            <div class="form-row">
                                <div class="field-group">
                                    <label>收件人姓名 *</label>
                                    <input type="text" id="addr-name" placeholder="收件人姓名">
                                </div>
                                <div class="field-group">
                                    <label>手機號碼 *</label>
                                    <input type="tel" id="addr-phone" placeholder="09XXXXXXXX">
                                </div>
                            </div>
                            <div class="field-group">
                                <label>縣市 *</label>
                                <select id="addr-city">
                                    <option value="">請選擇縣市</option>
                                    <option>台北市</option><option>新北市</option><option>桃園市</option>
                                    <option>台中市</option><option>台南市</option><option>高雄市</option>
                                    <option>基隆市</option><option>新竹市</option><option>新竹縣</option>
                                    <option>苗栗縣</option><option>彰化縣</option><option>南投縣</option>
                                    <option>雲林縣</option><option>嘉義市</option><option>嘉義縣</option>
                                    <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
                                    <option>台東縣</option><option>澎湖縣</option><option>金門縣</option>
                                    <option>連江縣</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label>詳細地址 *</label>
                                <input type="text" id="addr-detail" placeholder="區/鄉鎮市 + 路/街 + 號">
                            </div>
                            <div class="terms-row" style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:#666;margin-bottom:0;">
                                <input type="checkbox" id="addr-default" style="accent-color:var(--primary-orange);">
                                <label for="addr-default">設為預設地址</label>
                            </div>
                            <div class="btn-row">
                                <button class="btn-primary" id="btn-save-address">
                                    <i class="fas fa-save" style="margin-right:6px;"></i>儲存地址
                                </button>
                                <button class="btn-ghost" id="btn-cancel-address">取消</button>
                            </div>
                        </div>
                    </div>

                    <button class="btn-add-address" id="btn-show-addr-form">
                        <i class="fas fa-plus"></i> 新增收件地址
                    </button>
                </div>

            </main>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
    <script>
    /* ============================================================
       member.html — 會員中心邏輯（Supabase 串接）
       ============================================================ */

    const SUPABASE_URL  = 'https://rlmnjvcppucaehgxlmim.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsbW5qdmNwcHVjYWVoZ3hsbWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjAxNTgsImV4cCI6MjA4OTI5NjE1OH0.sPGXNrIdILGNmEbBf5v5IU1tBvZ1ySD0-0TLX-YYmIc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentUser = null;

    /* ── 頁面初始化：確認登入狀態 ── */
    async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = session.user;
        await loadProfile();
        await loadOrders();
        await loadAddresses();
        document.getElementById('pageLoading').classList.add('hide');
    }

    /* ── 載入個人資料 ── */
    async function loadProfile() {
        const user = currentUser;
        const meta = user.user_metadata || {};

        // 側邊欄
        const name   = meta.full_name || meta.name || user.email.split('@')[0];
        const email  = user.email;
        const initial = name.charAt(0).toUpperCase();

        document.getElementById('sidebarName').textContent  = name;
        document.getElementById('sidebarEmail').textContent = email;
        document.getElementById('sidebarInitial').textContent = initial;

        if (meta.avatar_url) {
            document.getElementById('sidebarAvatar').innerHTML =
                '<img src="' + meta.avatar_url + '" alt="頭像">';
        }

        // 表單填入
        document.getElementById('profile-email').value = email;
        document.getElementById('profile-name').value  = name;

        // 從 profiles 資料表取額外資料
        const { data } = await _supabase
            .from('profiles')
            .select('phone, birthday')
            .eq('id', user.id)
            .single();

        if (data) {
            document.getElementById('profile-phone').value    = data.phone    || '';
            document.getElementById('profile-birthday').value = data.birthday || '';
        }

        // 更新 MolosAuth
        MolosAuth.login({ name, email, avatar: meta.avatar_url || '', via: 'supabase', id: user.id });
    }

    /* ── 儲存個人資料 ── */
    document.getElementById('btn-save-profile').addEventListener('click', async function() {
        const name     = document.getElementById('profile-name').value.trim();
        const phone    = document.getElementById('profile-phone').value.trim();
        const birthday = document.getElementById('profile-birthday').value;

        if (name.length < 2) {
            showAlert('profile-error', 'profile-error-msg', '暱稱至少需要 2 個字元');
            return;
        }

        setBtnLoading(this, '儲存中…');

        // 更新 Auth metadata
        const { error: metaErr } = await _supabase.auth.updateUser({
            data: { full_name: name }
        });

        // 更新 profiles 資料表
        const { error: profileErr } = await _supabase
            .from('profiles')
            .upsert({ id: currentUser.id, phone, birthday, updated_at: new Date().toISOString() });

        resetBtn(this, '<i class="fas fa-save" style="margin-right:6px;"></i>儲存變更');

        if (metaErr || profileErr) {
            showAlert('profile-error', 'profile-error-msg', '儲存失敗，請稍後再試');
        } else {
            document.getElementById('sidebarName').textContent = name;
            document.getElementById('sidebarInitial').textContent = name.charAt(0).toUpperCase();
            document.getElementById('profile-success').classList.add('show');
            setTimeout(() => document.getElementById('profile-success').classList.remove('show'), 3000);
        }
    });

    /* ── 修改密碼 ── */
    document.getElementById('btn-save-password').addEventListener('click', async function() {
        const pw  = document.getElementById('new-pw').value;
        const pw2 = document.getElementById('new-pw2').value;

        if (pw.length < 8) {
            showAlert('pw-error', 'pw-error-msg', '密碼至少需要 8 個字元');
            return;
        }
        if (pw !== pw2) {
            showAlert('pw-error', 'pw-error-msg', '兩次密碼不一致');
            return;
        }

        setBtnLoading(this, '更新中…');
        const { error } = await _supabase.auth.updateUser({ password: pw });
        resetBtn(this, '<i class="fas fa-key" style="margin-right:6px;"></i>更新密碼');

        if (error) {
            showAlert('pw-error', 'pw-error-msg', '密碼更新失敗：' + error.message);
        } else {
            document.getElementById('pw-success').classList.add('show');
            document.getElementById('new-pw').value  = '';
            document.getElementById('new-pw2').value = '';
            setTimeout(async () => {
                await _supabase.auth.signOut();
                window.location.href = 'login.html';
            }, 2000);
        }
    });

    /* ── 載入訂單 ── */
    async function loadOrders() {
        const { data: orders, error } = await _supabase
            .from('orders')
            .select('*, order_items(*, products(name))')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });

        const container = document.getElementById('orders-content');

        if (error || !orders || orders.length === 0) {
            container.innerHTML =
                '<div class="order-empty">' +
                '<i class="fas fa-box-open"></i>' +
                '<p>目前尚無訂單紀錄</p>' +
                '</div>';
            return;
        }

        const statusMap = {
            pending:   ['待付款', 'status-pending'],
            paid:      ['已付款', 'status-paid'],
            shipped:   ['已出貨', 'status-shipped'],
            completed: ['已完成', 'status-completed'],
            cancelled: ['已取消', 'status-cancelled']
        };

        container.innerHTML = orders.map(function(order) {
            const [statusText, statusClass] = statusMap[order.status] || ['未知', ''];
            const date = new Date(order.created_at).toLocaleDateString('zh-TW');
            const items = (order.order_items || []).map(function(item) {
                return '<div class="order-item-row">' +
                    '<span class="order-item-name">' + (item.products ? item.products.name : '商品') + '</span>' +
                    '<span class="order-item-qty">x' + item.quantity + '</span>' +
                    '<span class="order-item-price">NT$ ' + item.price.toLocaleString() + '</span>' +
                    '</div>';
            }).join('');

            return '<div class="order-card">' +
                '<div class="order-card-header">' +
                '<span class="order-no">訂單編號：' + order.id.slice(0,8).toUpperCase() + '</span>' +
                '<span class="order-date">' + date + '</span>' +
                '<span class="order-status ' + statusClass + '">' + statusText + '</span>' +
                '</div>' +
                '<div class="order-card-body">' + items + '</div>' +
                '<div class="order-card-footer">' +
                '<span class="order-total-label">訂單總計</span>' +
                '<span class="order-total-price">NT$ ' + (order.total_amount || 0).toLocaleString() + '</span>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    /* ── 載入地址 ── */
    async function loadAddresses() {
        const { data: addrs } = await _supabase
            .from('profiles')
            .select('addresses')
            .eq('id', currentUser.id)
            .single();

        const list = (addrs && addrs.addresses) ? addrs.addresses : [];
        renderAddresses(list);
    }

    function renderAddresses(list) {
        const container = document.getElementById('address-list');
        if (!list || list.length === 0) {
            container.innerHTML = '';
            return;
        }
        container.innerHTML = '<div class="address-grid">' +
            list.map(function(addr, i) {
                return '<div class="address-card ' + (addr.is_default ? 'default-addr' : '') + '">' +
                    (addr.is_default ? '<span class="address-default-badge">預設地址</span>' : '') +
                    '<div class="address-name">' + addr.name + '</div>' +
                    '<div class="address-phone">' + addr.phone + '</div>' +
                    '<div class="address-text">' + addr.city + ' ' + addr.detail + '</div>' +
                    '<div class="address-actions">' +
                    (!addr.is_default ? '<button class="btn-sm" onclick="setDefaultAddress(' + i + ')">設為預設</button>' : '') +
                    '<button class="btn-sm danger" onclick="deleteAddress(' + i + ')">刪除</button>' +
                    '</div>' +
                    '</div>';
            }).join('') +
            '</div>';
    }

    /* ── 新增地址 ── */
    document.getElementById('btn-show-addr-form').addEventListener('click', function() {
        document.getElementById('address-form-wrap').style.display = 'block';
        this.style.display = 'none';
    });

    document.getElementById('btn-cancel-address').addEventListener('click', function() {
        document.getElementById('address-form-wrap').style.display = 'none';
        document.getElementById('btn-show-addr-form').style.display = 'flex';
    });

    document.getElementById('btn-save-address').addEventListener('click', async function() {
        const name   = document.getElementById('addr-name').value.trim();
        const phone  = document.getElementById('addr-phone').value.trim();
        const city   = document.getElementById('addr-city').value;
        const detail = document.getElementById('addr-detail').value.trim();
        const isDefault = document.getElementById('addr-default').checked;

        if (!name || !phone || !city || !detail) {
            showAlert('addr-error', 'addr-error-msg', '請填寫所有必填欄位');
            return;
        }

        setBtnLoading(this, '儲存中…');

        // 取得現有地址
        const { data } = await _supabase
            .from('profiles')
            .select('addresses')
            .eq('id', currentUser.id)
            .single();

        let list = (data && data.addresses) ? data.addresses : [];

        if (isDefault) {
            list = list.map(a => ({ ...a, is_default: false }));
        }

        list.push({ name, phone, city, detail, is_default: isDefault || list.length === 0 });

        const { error } = await _supabase
            .from('profiles')
            .upsert({ id: currentUser.id, addresses: list });

        resetBtn(this, '<i class="fas fa-save" style="margin-right:6px;"></i>儲存地址');

        if (error) {
            showAlert('addr-error', 'addr-error-msg', '儲存失敗，請稍後再試');
        } else {
            renderAddresses(list);
            document.getElementById('address-form-wrap').style.display = 'none';
            document.getElementById('btn-show-addr-form').style.display = 'flex';
            document.getElementById('addr-name').value = '';
            document.getElementById('addr-phone').value = '';
            document.getElementById('addr-city').value = '';
            document.getElementById('addr-detail').value = '';
            document.getElementById('addr-default').checked = false;
            document.getElementById('addr-success').classList.add('show');
            setTimeout(() => document.getElementById('addr-success').classList.remove('show'), 3000);
        }
    });

    /* ── 設為預設地址 ── */
    async function setDefaultAddress(index) {
        const { data } = await _supabase
            .from('profiles').select('addresses').eq('id', currentUser.id).single();
        let list = data.addresses || [];
        list = list.map((a, i) => ({ ...a, is_default: i === index }));
        await _supabase.from('profiles').upsert({ id: currentUser.id, addresses: list });
        renderAddresses(list);
    }

    /* ── 刪除地址 ── */
    async function deleteAddress(index) {
        if (!confirm('確定要刪除此地址？')) return;
        const { data } = await _supabase
            .from('profiles').select('addresses').eq('id', currentUser.id).single();
        let list = data.addresses || [];
        list.splice(index, 1);
        if (list.length > 0 && !list.some(a => a.is_default)) {
            list[0].is_default = true;
        }
        await _supabase.from('profiles').upsert({ id: currentUser.id, addresses: list });
        renderAddresses(list);
    }

    /* ── 登出 ── */
    document.getElementById('btnLogout').addEventListener('click', async function() {
        await _supabase.auth.signOut();
        MolosAuth.logout();
        window.location.href = 'index.html';
    });

    /* ── 頁籤切換 ── */
    document.querySelectorAll('.member-nav-item[data-panel]').forEach(function(item) {
        item.addEventListener('click', function() {
            document.querySelectorAll('.member-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.member-panel').forEach(p => p.classList.remove('active'));
            item.classList.add('active');
            document.getElementById(item.dataset.panel).classList.add('active');
        });
    });

    /* ── URL Hash 直接跳到訂單 ── */
    if (window.location.hash === '#orders') {
        document.querySelector('[data-panel="panel-orders"]').click();
    }

    /* ── 顯示/隱藏密碼 ── */
    document.querySelectorAll('.toggle-pw').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var input = document.getElementById(btn.dataset.target);
            var icon  = btn.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });
    });

    /* ── 工具函式 ── */
    function setBtnLoading(btn, text) {
        btn.disabled = true;
        btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;"></span>' + text;
    }
    function resetBtn(btn, html) {
        btn.disabled = false;
        btn.innerHTML = html;
    }
    function showAlert(alertId, msgId, msg) {
        if (msgId) document.getElementById(msgId).textContent = msg;
        const el = document.getElementById(alertId);
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
    }

    /* ── 啟動 ── */
    init();

    </script>
</body>
</html>
