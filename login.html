<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <link rel="icon" type="image/png" href="my-favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="my-favicon/favicon.svg">
    <link rel="shortcut icon" href="my-favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="my-favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Molos 毛樂適">
    <link rel="manifest" href="my-favicon/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - Molos 毛樂適</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── 登入頁整體佈局 ── */
        .login-page {
            min-height: 100vh;
            background: var(--secondary-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(90,75,64,0.12);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: cardIn 0.4s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 頂部品牌區 ── */
        .login-brand {
            background: linear-gradient(135deg, #FFCB8E 0%, #FFE4C4 100%);
            padding: 32px 40px 28px;
            text-align: center;
        }
        .login-brand .login-illus { width: 150px; height: auto; display: block; margin: 0 auto 8px; mix-blend-mode: multiply; }
        .login-brand p { color: #8a6040; font-size: 0.9rem; margin: 4px 0 0; font-weight: bold; text-shadow: 0 1px 0 rgba(255,255,255,0.4); }

        /* ── 頁籤切換 ── */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }
        .auth-tab {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            color: #bbb;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .auth-tab.active {
            color: var(--primary-orange);
        }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 2.5px;
            background: var(--primary-orange);
            border-radius: 2px 2px 0 0;
        }

        /* ── 表單主體 ── */
        .auth-body { padding: 32px 40px 36px; }

        .auth-panel { display: none; }
        .auth-panel.active {
            display: block;
            animation: panelIn 0.25s ease;
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateX(8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── 社群登入按鈕 ── */
        .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border: 1.5px solid #e8e8e8;
            background: #fff;
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .btn-social:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

        .btn-social.google  { border-color: #e0e0e0; }
        .btn-social.google:hover  { background: #fafafa; }
        .btn-social.facebook { border-color: #1877f2; color: #1877f2; }
        .btn-social.facebook:hover { background: #f0f6ff; }
        .btn-social.line    { border-color: #06c755; color: #06c755; }
        .btn-social.line:hover    { background: #f0fdf4; }

        .btn-social img { width: 20px; height: 20px; }
        .btn-social .fa { font-size: 1.1rem; }

        /* ── 分隔線 ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #ccc;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        /* ── 表單欄位 ── */
        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 7px;
        }
        .field-wrap {
            position: relative;
        }
        .field-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            font-size: 0.95rem;
            pointer-events: none;
        }
        .field-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fafafa;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .field-wrap input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255,157,66,0.15);
            background: #fff;
        }
        .field-wrap input.is-error { border-color: #e74c3c; }
        .field-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #bbb;
            font-size: 0.9rem;
            padding: 4px;
        }
        .field-wrap .toggle-pw:hover { color: var(--primary-orange); }

        .field-error {
            display: none;
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .field-error.show { display: block; }

        /* ── 忘記密碼 ── */
        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .forgot-row a {
            font-size: 0.82rem;
            color: var(--primary-orange);
            text-decoration: none;
        }
        .forgot-row a:hover { text-decoration: underline; }

        /* ── 主送出按鈕 ── */
        .btn-auth {
            width: 100%;
            padding: 13px;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255,157,66,0.3);
            transition: all 0.2s;
        }
        .btn-auth:hover { background: #e68a35; transform: scale(1.02); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── 同意條款 ── */
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.82rem;
            color: #999;
        }
        .terms-row input[type="checkbox"] { margin-top: 2px; accent-color: var(--primary-orange); }
        .terms-row a { color: var(--primary-orange); text-decoration: none; }
        .terms-row a:hover { text-decoration: underline; }

        /* ── 忘記密碼彈窗 ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: #fff;
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            animation: cardIn 0.3s ease;
        }
        .modal-box .modal-icon {
            width: 60px; height: 60px;
            background: #fff3e6;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .modal-box .modal-icon i { font-size: 1.5rem; color: var(--primary-orange); }
        .modal-box h3 { color: var(--text-dark); margin-bottom: 8px; font-size: 1.15rem; }
        .modal-box p { color: #999; font-size: 0.88rem; margin-bottom: 20px; line-height: 1.6; }
        .modal-box .field-wrap input { padding-left: 14px; }
        .modal-close-btn {
            position: absolute;
            top: 14px; right: 16px;
            background: none; border: none;
            font-size: 1.2rem; color: #ccc;
            cursor: pointer;
        }
        .modal-box-inner { position: relative; }

        @media (max-width: 480px) {
            .auth-body { padding: 24px 24px 28px; }
            .login-brand { padding: 24px 24px 20px; }
        }
    </style>
</head>

        <div class="container">

    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- 登入卡片 -->
    <div class="login-page">
        <div class="login-card">

            <!-- 品牌頭部 -->
            <div class="login-brand">
                <img src="images/cat-dog-illustration.png" alt="" class="login-illus" aria-hidden="true">
                <p>歡迎回來，毛孩守護者 🐾</p>
            </div>

            <!-- 頁籤 -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="panel-login" id="tab-login">登入</button>
                <button class="auth-tab" data-target="panel-register" id="tab-register">註冊會員</button>
            </div>

            <!-- 表單主體 -->
            <div class="auth-body">

                <!-- ===== 登入面板 ===== -->
                <div class="auth-panel active" id="panel-login">

                    <!-- 社群登入 -->
                    <div class="social-btns">
                        <button class="btn-social google" onclick="handleSocialLogin('Google')">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                            以 Google 帳號登入
                        </button>
                    </div>

                    <div class="divider">或用 Email 登入</div>

                    <!-- Email 表單 -->
                    <form id="login-form" novalidate>
                        <div class="field-group">
                            <label>電子信箱</label>
                            <div class="field-wrap">
                                <i class="fas fa-envelope field-icon"></i>
                                <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
                            </div>
                            <p class="field-error" id="err-login-email">請填寫有效的 Email</p>
                        </div>

                        <div class="field-group">
                            <label>密碼</label>
                            <div class="field-wrap">
                                <i class="fas fa-lock field-icon"></i>
                                <input type="password" id="login-pw" placeholder="請輸入密碼" autocomplete="current-password">
                                <button type="button" class="toggle-pw" data-target="login-pw">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="field-error" id="err-login-pw">請填寫密碼</p>
                        </div>

                        <div class="forgot-row">
                            <a href="#" id="forgot-link">忘記密碼？</a>
                        </div>

                        <button type="submit" class="btn-auth" id="btn-login">
                            <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>登入
                        </button>
                    </form>
                </div>

                <!-- ===== 註冊面板 ===== -->
                <div class="auth-panel" id="panel-register">

                    <!-- 社群快速註冊 -->
                    <div class="social-btns">
                        <button class="btn-social google" onclick="handleSocialLogin('Google')">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                            以 Google 帳號快速註冊
                        </button>
                    </div>

                    <div class="divider">或填寫資料註冊</div>

                    <form id="register-form" novalidate>
                        <div class="field-group">
                            <label>暱稱</label>
                            <div class="field-wrap">
                                <i class="fas fa-user field-icon"></i>
                                <input type="text" id="reg-name" placeholder="如何稱呼您" maxlength="20" autocomplete="nickname">
                            </div>
                            <p class="field-error" id="err-reg-name">請填寫暱稱（2–20字）</p>
                        </div>

                        <div class="field-group">
                            <label>電子信箱</label>
                            <div class="field-wrap">
                                <i class="fas fa-envelope field-icon"></i>
                                <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
                            </div>
                            <p class="field-error" id="err-reg-email">請填寫有效的 Email</p>
                        </div>

                        <div class="field-group">
                            <label>密碼</label>
                            <div class="field-wrap">
                                <i class="fas fa-lock field-icon"></i>
                                <input type="password" id="reg-pw" placeholder="至少 8 個字元" autocomplete="new-password">
                                <button type="button" class="toggle-pw" data-target="reg-pw">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="field-error" id="err-reg-pw">密碼至少 8 個字元</p>
                        </div>

                        <div class="field-group">
                            <label>確認密碼</label>
                            <div class="field-wrap">
                                <i class="fas fa-lock field-icon"></i>
                                <input type="password" id="reg-pw2" placeholder="再輸入一次密碼" autocomplete="new-password">
                                <button type="button" class="toggle-pw" data-target="reg-pw2">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="field-error" id="err-reg-pw2">兩次密碼不一致</p>
                        </div>

                            <input type="checkbox" id="agree-terms">
                            <label for="agree-terms">我已閱讀並同意 <a href="#">服務條款</a> 及 <a href="#">隱私權政策</a></label>
                        </div>
                        <p class="field-error" id="err-terms">請先勾選同意條款</p>

                        <button type="submit" class="btn-auth" id="btn-register">
                            <i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊
                        </button>
                    </form>
                </div>

            </div><!-- /auth-body -->
        </div><!-- /login-card -->
    </div><!-- /login-page -->

    <!-- 忘記密碼彈窗 -->
    <div class="modal-backdrop" id="forgot-modal">
        <div class="modal-box">
            <div class="modal-box-inner">
                <button class="modal-close-btn" id="forgot-close"><i class="fas fa-times"></i></button>
                <div class="modal-icon"><i class="fas fa-key"></i></div>
                <h3>重設密碼</h3>
                <p>請輸入您的帳號 Email，<br>我們將寄送重設連結至您的信箱。</p>
                <div class="field-wrap" style="margin-bottom:8px;">
                    <input type="email" id="forgot-email" placeholder="your@email.com">
                </div>
                <p id="forgot-err-msg" style="display:none;color:#e74c3c;font-size:0.82rem;margin:0 0 12px;text-align:center;line-height:1.6;"></p>
                <button class="btn-auth" id="btn-forgot-send">
                    <i class="fas fa-paper-plane" style="margin-right:8px;"></i>寄送重設連結
                </button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
    /* ── login.html 專屬互動邏輯（Supabase 版）── */

    var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    /* ── 頁籤切換 ── */
    document.querySelectorAll('.auth-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.auth-tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.auth-panel').forEach(function(p){ p.classList.remove('active'); });
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        });
    });

    /* ── 顯示/隱藏密碼 ── */
    document.querySelectorAll('.toggle-pw').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var input = document.getElementById(btn.dataset.target);
            var icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    });

    /* ── 忘記密碼彈窗 ── */

    /* 每次開啟都 reset 成填表狀態（同 Google / Apple 的做法） */
    var _forgotFormHTML =
        '<button class="modal-close-btn" id="forgot-close"><i class="fas fa-times"></i></button>' +
        '<div class="modal-icon"><i class="fas fa-key"></i></div>' +
        '<h3>重設密碼</h3>' +
        '<p>請輸入您的帳號 Email，<br>我們將寄送重設連結至您的信箱。</p>' +
        '<div class="field-wrap" style="margin-bottom:8px;">' +
        '<input type="email" id="forgot-email" placeholder="your@email.com"></div>' +
        '<p id="forgot-err-msg" style="display:none;color:#e74c3c;font-size:0.82rem;margin:0 0 12px;text-align:center;line-height:1.6;"></p>' +
        '<button class="btn-auth" id="btn-forgot-send">' +
        '<i class="fas fa-paper-plane" style="margin-right:8px;"></i>寄送重設連結</button>';

    function openForgotModal() {
        document.querySelector('#forgot-modal .modal-box-inner').innerHTML = _forgotFormHTML;
        _bindForgotEvents();
        document.getElementById('forgot-modal').classList.add('show');
    }

    function _bindForgotEvents() {
        document.getElementById('forgot-close').addEventListener('click', function() {
            document.getElementById('forgot-modal').classList.remove('show');
        });

        document.getElementById('btn-forgot-send').addEventListener('click', function() {
            var email = document.getElementById('forgot-email').value.trim();
            if (!EMAIL_RE.test(email)) {
                document.getElementById('forgot-email').classList.add('is-error');
                return;
            }
            var btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spin-icon"></span>寄送中…';

            window.db.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://dev.molos.pages.dev/login.html'
            }).then(function(res) {
                if (res.error) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:8px;"></i>寄送重設連結';
                    var errEl = document.getElementById('forgot-err-msg');
                    if (res.error.message.indexOf('Error sending recovery email') !== -1) {
                        errEl.innerHTML = '此帳號是以 <strong>Google 帳號</strong> 登入，<br>不需要密碼重設。<br>請直接使用 Google 登入按鈕登入。';
                    } else {
                        errEl.textContent = '寄送失敗，請確認 Email 是否正確。';
                    }
                    errEl.style.display = 'block';
                    return;
                }
                document.querySelector('#forgot-modal .modal-box-inner').innerHTML =
                    '<div class="modal-icon" style="background:#eafaf1;"><i class="fas fa-check" style="color:#27ae60;"></i></div>' +
                    '<h3>已寄出！</h3>' +
                    '<p>請至 <strong>' + email + '</strong><br>收取密碼重設信件。<br>' +
                    '<span style="font-size:0.82rem;color:#bbb;">若未收到，請確認垃圾郵件資料夾。</span></p>' +
                    '<button class="btn-auth" style="background:#27ae60;" onclick="document.getElementById(\'forgot-modal\').classList.remove(\'show\')">' +
                    '<i class="fas fa-check" style="margin-right:8px;"></i>確認</button>';
            });
        });
    }

    document.getElementById('forgot-link').addEventListener('click', function(e) {
        e.preventDefault();
        openForgotModal();
    });

    /* ── 密碼重設回調（信中連結點擊後回到此頁）── */
    document.addEventListener('molos:password-recovery', function() {
        var backdrop = document.getElementById('forgot-modal');
        backdrop.classList.add('show');
        document.querySelector('#forgot-modal .modal-box-inner').innerHTML =
            '<div class="modal-icon"><i class="fas fa-lock"></i></div>' +
            '<h3>設定新密碼</h3>' +
            '<p style="color:#999;font-size:0.88rem;margin-bottom:16px;">請輸入您的新密碼（至少 8 個字元）。</p>' +
            '<div class="field-wrap" style="margin-bottom:12px;">' +
            '<input type="password" id="reset-pw1" placeholder="新密碼" style="padding:12px 14px;"></div>' +
            '<div class="field-wrap" style="margin-bottom:16px;">' +
            '<input type="password" id="reset-pw2" placeholder="再次輸入新密碼" style="padding:12px 14px;"></div>' +
            '<p id="reset-pw-err" style="color:#e74c3c;font-size:0.82rem;display:none;margin-bottom:12px;"></p>' +
            '<button class="btn-auth" id="btn-reset-confirm">' +
            '<i class="fas fa-check" style="margin-right:8px;"></i>確認更新密碼</button>';

        document.getElementById('btn-reset-confirm').addEventListener('click', function() {
            var pw1 = document.getElementById('reset-pw1').value;
            var pw2 = document.getElementById('reset-pw2').value;
            var errEl = document.getElementById('reset-pw-err');
            if (pw1.length < 8) { errEl.textContent = '密碼至少 8 個字元'; errEl.style.display = 'block'; return; }
            if (pw1 !== pw2)    { errEl.textContent = '兩次密碼不一致';     errEl.style.display = 'block'; return; }
            errEl.style.display = 'none';
            var btn = this;
            btn.disabled = true;
            btn.innerHTML = '<span class="spin-icon"></span>更新中…';
            window.db.auth.updateUser({ password: pw1 }).then(function(res) {
                if (res.error) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check" style="margin-right:8px;"></i>確認更新密碼';
                    errEl.textContent = '更新失敗：' + res.error.message;
                    errEl.style.display = 'block';
                    return;
                }
                document.querySelector('#forgot-modal .modal-box-inner').innerHTML =
                    '<div class="modal-icon" style="background:#eafaf1;"><i class="fas fa-check" style="color:#27ae60;"></i></div>' +
                    '<h3>密碼已更新！</h3><p>請使用新密碼重新登入。</p>' +
                    '<button class="btn-auth" style="background:#27ae60;" ' +
                    'onclick="document.getElementById(\'forgot-modal\').classList.remove(\'show\')">前往登入</button>';
            });
        });
    });

    /* ── 社群登入 ── */
    function handleSocialLogin(provider) {
        if (provider === 'Google') {
            window.db.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://dev.molos.pages.dev/member.html' }
            });
        }
    }

    /* ── Email 登入 ── */
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var pw    = document.getElementById('login-pw').value;

        setFieldErr('login-email', 'err-login-email', EMAIL_RE.test(email));
        setFieldErr('login-pw',    'err-login-pw',    pw.length > 0);
        if (!EMAIL_RE.test(email) || !pw) return;

        var btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.innerHTML = '<span class="spin-icon"></span>登入中…';

        window.db.auth.signInWithPassword({ email: email, password: pw })
            .then(function(res) {
                if (res.error) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>登入';
                    var msg = res.error.message;
                    if (msg.indexOf('Invalid login credentials') !== -1) {
                        showFormMsg('panel-login', '帳號或密碼錯誤，請重新確認。');
                    } else if (msg.indexOf('Email not confirmed') !== -1) {
                        showFormMsg('panel-login', '請先至信箱點擊驗證連結，完成驗證後再登入。');
                    } else {
                        showFormMsg('panel-login', '登入失敗：' + msg);
                    }
                    return;
                }
                window.location.href = 'member.html';
            });
    });

    /* ── Email 註冊 ── */
    document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var name  = document.getElementById('reg-name').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var pw    = document.getElementById('reg-pw').value;
        var pw2   = document.getElementById('reg-pw2').value;
        var terms = document.getElementById('agree-terms').checked;
        var ok = true;

        function chk(inputId, errId, cond) {
            document.getElementById(inputId).classList.toggle('is-error', !cond);
            document.getElementById(errId).classList.toggle('show', !cond);
            if (!cond) ok = false;
        }
        chk('reg-name',  'err-reg-name',  name.length >= 2);
        chk('reg-email', 'err-reg-email', EMAIL_RE.test(email));
        chk('reg-pw',    'err-reg-pw',    pw.length >= 8);
        chk('reg-pw2',   'err-reg-pw2',   pw2 === pw && pw2 !== '');
        document.getElementById('err-terms').classList.toggle('show', !terms);
        if (!terms) ok = false;
        if (!ok) return;

        var btn = document.getElementById('btn-register');
        btn.disabled = true;
        btn.innerHTML = '<span class="spin-icon"></span>建立帳號中…';

        window.db.auth.signUp({
            email: email,
            password: pw,
            options: { data: { full_name: name } }
        }).then(function(res) {
            if (res.error) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊';
                var msg = res.error.message;
                if (msg.indexOf('already') !== -1 || msg.indexOf('registered') !== -1) {
                    showFormMsg('panel-register', '此 Email 已被註冊，請直接登入或使用「忘記密碼」。');
                } else if (msg.indexOf('rate') !== -1 || msg.indexOf('429') !== -1 || msg.indexOf('exceeded') !== -1 || msg.indexOf('too many') !== -1) {
                    showFormMsg('panel-register', '驗證信寄送次數過多，請稍候幾分鐘再試。');
                } else {
                    showFormMsg('panel-register', '註冊失敗：' + msg);
                }
                return;
            }
            /* Supabase 在 Email 已存在（未驗證）時回傳 user.identities = [] 而非 error */
            if (res.data && res.data.user && res.data.user.identities && res.data.user.identities.length === 0) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊';
                showFormMsg('panel-register', '此 Email 已被註冊但尚未驗證。請至信箱確認，或點擊下方重新寄送。');
                showResendOption(email);
                return;
            }
            showRegisterSuccess(email);
        }).catch(function() {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊';
            showFormMsg('panel-register', '網路連線異常，請確認網路後再試。');
        });
    });

    /* ── Helper：欄位錯誤切換 ── */
    function setFieldErr(inputId, errId, isOk) {
        document.getElementById(inputId).classList.toggle('is-error', !isOk);
        document.getElementById(errId).classList.toggle('show', !isOk);
    }

    /* ── Helper：面板錯誤提示 ── */
    function showFormMsg(panelId, msg) {
        var panel = document.getElementById(panelId);
        var ex = panel.querySelector('.form-alert');
        if (ex) ex.remove();
        var p = document.createElement('p');
        p.className = 'form-alert';
        p.style.cssText = 'color:#e74c3c;font-size:0.85rem;margin:-8px 0 14px;text-align:center;';
        p.textContent = msg;
        panel.insertBefore(p, panel.querySelector('.btn-auth'));
    }

    /* ── 註冊成功：顯示驗證提示 ── */
    function showRegisterSuccess(email) {
        document.getElementById('panel-register').innerHTML =
            '<div style="text-align:center;padding:16px 0;">' +
            '<div style="width:64px;height:64px;background:#eafaf1;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">' +
            '<i class="fas fa-envelope" style="font-size:1.6rem;color:#27ae60;"></i></div>' +
            '<h3 style="color:var(--text-dark);margin-bottom:8px;">請驗證您的 Email</h3>' +
            '<p style="color:#999;font-size:0.9rem;line-height:1.8;">驗證信已寄至<br>' +
            '<strong style="color:var(--text-dark);">' + email + '</strong><br><br>' +
            '請點擊信中連結完成驗證，<br>驗證後即可登入。<br>' +
            '<span style="font-size:0.82rem;">若未收到，請先檢查垃圾郵件資料夾。</span></p>' +
            '<button class="btn-auth" id="btn-resend-success" style="margin-top:16px;background:#f0f0f0;color:#666;box-shadow:none;" ' +
            'onclick="handleResendEmail(\'' + email + '\', this)">' +
            '<i class="fas fa-redo" style="margin-right:8px;"></i>重新寄送驗證信</button>' +
            '<button class="btn-auth" style="margin-top:10px;" ' +
            'onclick="document.querySelector(\'[data-target=panel-login]\').click()">' +
            '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>前往登入</button></div>';
    }

    /* ── 已存在未驗證帳號：顯示重寄選項 ── */
    function showResendOption(email) {
        var panel = document.getElementById('panel-register');
        var ex = panel.querySelector('.resend-option');
        if (ex) return;
        var div = document.createElement('div');
        div.className = 'resend-option';
        div.style.cssText = 'text-align:center;margin-top:8px;';
        div.innerHTML = '<button class="btn-auth" style="background:#f0f0f0;color:#666;box-shadow:none;font-size:0.85rem;padding:10px;" ' +
            'onclick="handleResendEmail(\'' + email + '\', this)">' +
            '<i class="fas fa-redo" style="margin-right:6px;"></i>重新寄送驗證信</button>';
        panel.appendChild(div);
    }

    /* ── 重新寄送驗證信 ── */
    function handleResendEmail(email, btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spin-icon"></span>寄送中…';
        window.db.auth.resend({ type: 'signup', email: email })
            .then(function(res) {
                if (res.error) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-redo" style="margin-right:6px;"></i>重新寄送驗證信';
                    alert('寄送失敗：' + res.error.message);
                    return;
                }
                btn.innerHTML = '<i class="fas fa-check" style="margin-right:6px;"></i>已重新寄出！';
                setTimeout(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-redo" style="margin-right:6px;"></i>重新寄送驗證信';
                }, 30000);
            }).catch(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo" style="margin-right:6px;"></i>重新寄送驗證信';
                alert('網路異常，請稍後再試。');
            });
    }

    /* ── 點彈窗背景關閉 ── */
    document.getElementById('forgot-modal').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    /* ── spin 動畫 CSS ── */
    var s = document.createElement('style');
    s.textContent = '.spin-icon{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:_spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}@keyframes _spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
    </script>
</body>
</html>
