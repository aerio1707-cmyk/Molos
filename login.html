<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <link rel="icon" type="image/png" href="my-favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="my-favicon/favicon.svg">
    <link rel="shortcut icon" href="my-favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="my-favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Molos 毛樂適">
    <link rel="manifest" href="my-favicon/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - Molos 毛樂適</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── 登入頁整體佈局 ── */
        .login-page {
            min-height: 100vh;
            background: var(--secondary-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(90,75,64,0.12);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: cardIn 0.4s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── 頂部品牌區 ── */
        .login-brand {
            background: linear-gradient(135deg, #FF9D42 0%, #ffb96a 100%);
            padding: 32px 40px 28px;
            text-align: center;
        }
        .login-brand img { height: 56px; filter: brightness(0) invert(1); }
        .login-brand p { color: rgba(255,255,255,0.85); font-size: 0.9rem; margin: 8px 0 0; }

        /* ── 頁籤切換 ── */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }
        .auth-tab {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            color: #bbb;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .auth-tab.active {
            color: var(--primary-orange);
        }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 2.5px;
            background: var(--primary-orange);
            border-radius: 2px 2px 0 0;
        }

        /* ── 表單主體 ── */
        .auth-body { padding: 32px 40px 36px; }

        .auth-panel { display: none; }
        .auth-panel.active {
            display: block;
            animation: panelIn 0.25s ease;
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateX(8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── 社群登入按鈕 ── */
        .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border: 1.5px solid #e8e8e8;
            background: #fff;
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .btn-social:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

        .btn-social.google  { border-color: #e0e0e0; }
        .btn-social.google:hover  { background: #fafafa; }
        .btn-social.facebook { border-color: #1877f2; color: #1877f2; }
        .btn-social.facebook:hover { background: #f0f6ff; }
        .btn-social.line    { border-color: #06c755; color: #06c755; }
        .btn-social.line:hover    { background: #f0fdf4; }

        .btn-social img { width: 20px; height: 20px; }
        .btn-social .fa { font-size: 1.1rem; }

        /* ── 分隔線 ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #ccc;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        /* ── 表單欄位 ── */
        .field-group { margin-bottom: 18px; }
        .field-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 7px;
        }
        .field-wrap {
            position: relative;
        }
        .field-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ccc;
            font-size: 0.95rem;
            pointer-events: none;
        }
        .field-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fafafa;
            color: var(--text-dark);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .field-wrap input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255,157,66,0.15);
            background: #fff;
        }
        .field-wrap input.is-error { border-color: #e74c3c; }
        .field-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #bbb;
            font-size: 0.9rem;
            padding: 4px;
        }
        .field-wrap .toggle-pw:hover { color: var(--primary-orange); }

        .field-error {
            display: none;
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .field-error.show { display: block; }

        /* ── 忘記密碼 ── */
        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 18px;
        }
        .forgot-row a {
            font-size: 0.82rem;
            color: var(--primary-orange);
            text-decoration: none;
        }
        .forgot-row a:hover { text-decoration: underline; }

        /* ── 主送出按鈕 ── */
        .btn-auth {
            width: 100%;
            padding: 13px;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255,157,66,0.3);
            transition: all 0.2s;
        }
        .btn-auth:hover { background: #e68a35; transform: scale(1.02); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── 同意條款 ── */
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.82rem;
            color: #999;
        }
        .terms-row input[type="checkbox"] { margin-top: 2px; accent-color: var(--primary-orange); }
        .terms-row a { color: var(--primary-orange); text-decoration: none; }
        .terms-row a:hover { text-decoration: underline; }

        /* ── 忘記密碼彈窗 ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: #fff;
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            animation: cardIn 0.3s ease;
        }
        .modal-box .modal-icon {
            width: 60px; height: 60px;
            background: #fff3e6;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .modal-box .modal-icon i { font-size: 1.5rem; color: var(--primary-orange); }
        .modal-box h3 { color: var(--text-dark); margin-bottom: 8px; font-size: 1.15rem; }
        .modal-box p { color: #999; font-size: 0.88rem; margin-bottom: 20px; line-height: 1.6; }
        .modal-box .field-wrap input { padding-left: 14px; }
        .modal-close-btn {
            position: absolute;
            top: 14px; right: 16px;
            background: none; border: none;
            font-size: 1.2rem; color: #ccc;
            cursor: pointer;
        }
        .modal-box-inner { position: relative; }

        @media (max-width: 480px) {
            .auth-body { padding: 24px 24px 28px; }
            .login-brand { padding: 24px 24px 20px; }
        }
    </style>
</head>
<body>

    <!-- Navbar（精簡版，無登入按鈕）-->
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Molos 毛樂適" class="brand-logo"></a>
            </div>

                <i class="fas fa-bars"></i>

                <nav class="nav-menu" id="navMenu">
                    <ul>
                        <li><a href="index.html">首頁</a></li>

    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- 登入卡片 -->
    <div class="login-page">
        <div class="login-card">

            <!-- 品牌頭部 -->
            <div class="login-brand">
                <img src="images/cat-dog-illustration.png" alt="Molos 毛樂適">
                <p>歡迎回來，毛孩守護者 🐾</p>
            </div>

            <!-- 頁籤 -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="panel-login" id="tab-login">登入</button>
                <button class="auth-tab" data-target="panel-register" id="tab-register">註冊會員</button>
            </div>

            <!-- 表單主體 -->
            <div class="auth-body">

                <!-- ===== 登入面板 ===== -->
                <div class="auth-panel active" id="panel-login">

                    <!-- 社群登入 -->
                    <div class="social-btns">
                        <button class="btn-social google" onclick="handleSocialLogin('Google')">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                            以 Google 帳號登入
                        </button>
                        <button class="btn-social facebook" onclick="handleSocialLogin('Facebook')">
                            <i class="fab fa-facebook fa"></i>
                            以 Facebook 帳號登入
                        </button>
                        <button class="btn-social line" onclick="handleSocialLogin('LINE')">
                            <i class="fab fa-line fa"></i>
                            以 LINE 帳號登入
                        </button>
                    </div>

                    <div class="divider">或用 Email 登入</div>

                    <!-- Email 表單 -->
                    <form id="login-form" novalidate>
                        <div class="field-group">
                            <label>電子信箱</label>
                            <div class="field-wrap">
                                <i class="fas fa-envelope field-icon"></i>
                                <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
                            </div>
                            <p class="field-error" id="err-login-email">請填寫有效的 Email</p>

                        <button type="submit" class="btn-auth" id="btn-login">

                    </form>
                </div>

                <!-- ===== 註冊面板 ===== -->
                <div class="auth-panel" id="panel-register">

                    <!-- 社群快速註冊 -->
                    <div class="social-btns">
                        <button class="btn-social google" onclick="handleSocialLogin('Google')">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                            以 Google 帳號快速註冊
                        </button>
                        <button class="btn-social facebook" onclick="handleSocialLogin('Facebook')">
                            <i class="fab fa-facebook fa"></i>
                            以 Facebook 帳號快速註冊
                        </button>
                    </div>

                    <div class="divider">或填寫資料註冊</div>

                    <form id="register-form" novalidate>
                        <div class="field-group">
                            <label>暱稱</label>
                            <div class="field-wrap">
                                <i class="fas fa-user field-icon"></i>
                                <input type="text" id="reg-name" placeholder="如何稱呼您" maxlength="20" autocomplete="nickname">
                            </div>
                            <p class="field-error" id="err-reg-name">請填寫暱稱（2–20字）</p>
                        </div>

                        <div class="field-group">
                            <label>電子信箱</label>
                            <div class="field-wrap">
                                <i class="fas fa-envelope field-icon"></i>
                                <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
                            </div>
                            <p class="field-error" id="err-reg-email">請填寫有效的 Email</p>
                        </div>

                        <div class="field-group">
                            <label>密碼</label>
                            <div class="field-wrap">
                                <i class="fas fa-lock field-icon"></i>
                                <input type="password" id="reg-pw" placeholder="至少 8 個字元" autocomplete="new-password">
                                <button type="button" class="toggle-pw" data-target="reg-pw">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="field-error" id="err-reg-pw">密碼至少 8 個字元</p>
                        </div>

                        <div class="field-group">
                            <label>確認密碼</label>
                            <div class="field-wrap">
                                <i class="fas fa-lock field-icon"></i>
                                <input type="password" id="reg-pw2" placeholder="再輸入一次密碼" autocomplete="new-password">
                                <button type="button" class="toggle-pw" data-target="reg-pw2">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="field-error" id="err-reg-pw2">兩次密碼不一致</p>
                        </div>

                        <div class="terms-row">
                            <input type="checkbox" id="agree-terms">
                            <label for="agree-terms">我已閱讀並同意 <a href="#">服務條款</a> 及 <a href="#">隱私權政策</a></label>
                        </div>
                        <p class="field-error" id="err-terms">請先勾選同意條款</p>

                        <button type="submit" class="btn-auth" id="btn-register">
                            <i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊

                    </form>
                </div>

            </div><!-- /auth-body -->
        </div><!-- /login-card -->
    </div><!-- /login-page -->

    <!-- 忘記密碼彈窗 -->
    <div class="modal-backdrop" id="forgot-modal">
        <div class="modal-box">
            <div class="modal-box-inner">
                <button class="modal-close-btn" id="forgot-close"><i class="fas fa-times"></i></button>
                <div class="modal-icon"><i class="fas fa-key"></i></div>
                <h3>重設密碼</h3>
                <p>請輸入您的帳號 Email，<br>我們將寄送重設連結至您的信箱。</p>
                <div class="field-wrap" style="margin-bottom:16px;">
                    <input type="email" id="forgot-email" placeholder="your@email.com">
                </div>
                <button class="btn-auth" id="btn-forgot-send">
                    <i class="fas fa-paper-plane" style="margin-right:8px;"></i>寄送重設連結
                </button>
            </div>
        </div>
    </div>

    <!-- 社群登入提示彈窗（UI Demo） -->
    <div class="modal-backdrop" id="social-modal">
        <div class="modal-box">
            <div class="modal-box-inner">
                <button class="modal-close-btn" id="social-close"><i class="fas fa-times"></i></button>
                <div class="modal-icon"><i class="fas fa-plug"></i></div>
                <h3 id="social-modal-title">社群登入</h3>
                <p id="social-modal-desc">此功能串接後端後即可使用。<br>目前為 UI 展示模式。</p>
                <button class="btn-auth" onclick="demoLogin()">
                    <i class="fas fa-flask" style="margin-right:8px;"></i>體驗 Demo 登入
                </button>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
    <script>
    /* ============================================================
       login.html 專屬互動邏輯 — 真實 Supabase 連線版
       ============================================================ */

    /* ── Supabase 初始化 ── */
    const SUPABASE_URL  = 'https://rlmnjvcppucaehgxlmim.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsbW5qdmNwcHVjYWVoZ3hsbWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjAxNTgsImV4cCI6MjA4OTI5NjE1OH0.sPGXNrIdILGNmEbBf5v5IU1tBvZ1ySD0-0TLX-YYmIc';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    /* ── 頁面載入：若已登入直接跳轉 ── */
    _supabase.auth.getSession().then(function(res) {
        if (res.data.session) {
            window.location.href = 'member.html';
        }
    });

    /* ── 頁籤切換 ── */
    document.querySelectorAll('.auth-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.auth-tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.auth-panel').forEach(function(p){ p.classList.remove('active'); });
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        });
    });

    /* ── 顯示/隱藏密碼 ── */
    document.querySelectorAll('.toggle-pw').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var input = document.getElementById(btn.dataset.target);
            var icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    });

    /* ── 共用：設定按鈕 Loading 狀態 ── */
    function setBtnLoading(btnId, text) {
        var btn = document.getElementById(btnId);
        btn.disabled = true;
        btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;"></span>' + text;
    }
    function resetBtn(btnId, html) {
        var btn = document.getElementById(btnId);
        btn.disabled = false;
        btn.innerHTML = html;
    }

    /* ── 共用：顯示錯誤訊息 ── */
    function showAuthError(containerId, msg) {
        var el = document.getElementById(containerId);
        if (!el) {
            // 動態建立錯誤訊息區塊
            el = document.createElement('p');
            el.id = containerId;
            el.style.cssText = 'color:#e74c3c;font-size:0.85rem;text-align:center;margin-top:12px;';
            document.getElementById(btnId).parentNode.appendChild(el);
        }
        el.textContent = msg;
        el.style.display = 'block';
    }

    /* ── Google 登入（真實 OAuth）── */
    function handleSocialLogin(provider) {
        if (provider === 'Google') {
            _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/member.html' }
            });
        } else {
            /* Facebook / LINE 尚未設定，顯示提示 */
            document.getElementById('social-modal-title').textContent = provider + ' 登入';
            document.getElementById('social-modal-desc').textContent =
                provider + ' 登入尚未開放，敬請期待！';
            document.getElementById('social-modal').classList.add('show');
        }
    }
    document.getElementById('social-close').addEventListener('click', function() {
        document.getElementById('social-modal').classList.remove('show');
    });

    /* ── 忘記密碼彈窗 ── */
    document.getElementById('forgot-link').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('forgot-modal').classList.add('show');
    });
    document.getElementById('forgot-close').addEventListener('click', function() {
        document.getElementById('forgot-modal').classList.remove('show');
    });
    document.getElementById('btn-forgot-send').addEventListener('click', async function() {
        var email = document.getElementById('forgot-email').value.trim();
        if (!EMAIL_RE.test(email)) {
            document.getElementById('forgot-email').classList.add('is-error');
            return;
        }
        var btn = document.getElementById('btn-forgot-send');
        btn.disabled = true;
        btn.textContent = '寄送中…';

        var { error } = await _supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/reset-password.html'
        });

        if (error) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:8px;"></i>重新寄送';
            alert('寄送失敗：' + error.message);
        } else {
            document.querySelector('#forgot-modal .modal-box-inner').innerHTML =
                '<div class="modal-icon" style="background:#eafaf1;"><i class="fas fa-check" style="color:#27ae60;"></i></div>' +
                '<h3>已寄出！</h3>' +
                '<p>請至 <strong>' + email + '</strong><br>收取密碼重設信件。</p>' +
                '<button class="btn-auth" style="background:#27ae60;" onclick="document.getElementById(\'forgot-modal\').classList.remove(\'show\')">' +
                '<i class="fas fa-check" style="margin-right:8px;"></i>確認</button>';
        }
    });

    /* ── Email 登入表單（真實驗證）── */
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var pw    = document.getElementById('login-pw').value;
        var ok    = true;

        if (!EMAIL_RE.test(email)) {
            document.getElementById('login-email').classList.add('is-error');
            document.getElementById('err-login-email').classList.add('show');
            ok = false;
        } else {
            document.getElementById('login-email').classList.remove('is-error');
            document.getElementById('err-login-email').classList.remove('show');
        }
        if (!pw) {
            document.getElementById('login-pw').classList.add('is-error');
            document.getElementById('err-login-pw').classList.add('show');
            ok = false;
        } else {
            document.getElementById('login-pw').classList.remove('is-error');
            document.getElementById('err-login-pw').classList.remove('show');
        }
        if (!ok) return;

        setBtnLoading('btn-login', '登入中…');

        var { data, error } = await _supabase.auth.signInWithPassword({ email, password: pw });

        if (error) {
            resetBtn('btn-login', '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>登入');
            var errMsg = '登入失敗，請檢查帳號或密碼';
            if (error.message.includes('Email not confirmed')) errMsg = '請先至信箱驗證您的 Email';
            document.getElementById('err-login-pw').textContent = errMsg;
            document.getElementById('err-login-pw').classList.add('show');
        } else {
            /* 登入成功：更新 MolosAuth 並跳轉 */
            var user = data.user;
            MolosAuth.login({
                name:   user.user_metadata.full_name || user.user_metadata.name || email.split('@')[0],
                email:  user.email,
                avatar: user.user_metadata.avatar_url || '',
                via:    'email',
                id:     user.id
            });
            window.location.href = 'member.html';
        }
    });

    /* ── Email 註冊表單（真實建立帳號）── */
    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var name  = document.getElementById('reg-name').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var pw    = document.getElementById('reg-pw').value;
        var pw2   = document.getElementById('reg-pw2').value;
        var terms = document.getElementById('agree-terms').checked;
        var ok    = true;

        function setErr(inputId, errId, cond) {
            document.getElementById(inputId).classList.toggle('is-error', !cond);
            document.getElementById(errId).classList.toggle('show', !cond);
            if (!cond) ok = false;
        }

        setErr('reg-name',  'err-reg-name',  name.length >= 2);
        setErr('reg-email', 'err-reg-email', EMAIL_RE.test(email));
        setErr('reg-pw',    'err-reg-pw',    pw.length >= 8);
        setErr('reg-pw2',   'err-reg-pw2',   pw2 === pw && pw2 !== '');
        document.getElementById('err-terms').classList.toggle('show', !terms);
        if (!terms) ok = false;
        if (!ok) return;

        setBtnLoading('btn-register', '建立帳號中…');

        var { data, error } = await _supabase.auth.signUp({
            email,
            password: pw,
            options: { data: { full_name: name } }
        });

        if (error) {
            resetBtn('btn-register', '<i class="fas fa-user-plus" style="margin-right:8px;"></i>立即註冊');
            var errMsg = '註冊失敗：' + error.message;
            if (error.message.includes('already registered')) errMsg = '此 Email 已被註冊，請直接登入';
            document.getElementById('err-reg-email').textContent = errMsg;
            document.getElementById('err-reg-email').classList.add('show');
        } else {
            /* 註冊成功：提示驗證信 */
            document.getElementById('register-form').innerHTML =
                '<div style="text-align:center;padding:20px 0;">' +
                '<div style="width:64px;height:64px;background:#eafaf1;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">' +
                '<i class="fas fa-envelope-open-text" style="font-size:1.8rem;color:#27ae60;"></i></div>' +
                '<h3 style="color:#333;margin-bottom:8px;">驗證信已寄出！</h3>' +
                '<p style="color:#999;font-size:0.9rem;line-height:1.6;">請至 <strong style="color:#333;">' + email + '</strong><br>點擊信件中的連結完成驗證，<br>即可開始使用會員功能。</p>' +
                '<button class="btn-auth" style="margin-top:20px;" onclick="document.querySelector(\'[data-target=panel-login]\').click()">' +
                '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>前往登入</button></div>';
        }
    });

    /* ── 點彈窗背景關閉 ── */
    ['forgot-modal','social-modal'].forEach(function(id) {
        document.getElementById(id).addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
    });

    </script>
</body>
</html>
